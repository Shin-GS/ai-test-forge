name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (Java 25 + Gradle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Compile Server
        run: ./gradlew :packages:server:compileJava -x buildFrontend -x copyWeb

      - name: Compile Tests
        run: ./gradlew :packages:server:compileTestJava -x buildFrontend -x copyWeb

      - name: Run Tests
        run: ./gradlew :packages:server:test -x buildFrontend -x copyWeb
        continue-on-error: true

  web:
    name: Web (React + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: packages/web
        run: pnpm install --frozen-lockfile

      - name: Type Check
        working-directory: packages/web
        run: pnpm exec tsc -p tsconfig.app.json --noEmit

      - name: Build
        working-directory: packages/web
        run: pnpm build

      - name: Run Tests
        working-directory: packages/web
        run: pnpm exec vitest run

  docker-build:
    name: Docker Build (통합 이미지)
    runs-on: ubuntu-latest
    needs: [server, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.server -t ai-test-forge:test .
