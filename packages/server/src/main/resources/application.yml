server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  profiles:
    active: ${APP_PROFILE:local}
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_test_forge}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

spec-registry:
  stale-threshold: ${SPEC_STALE_THRESHOLD:5m}
  auto-delete-threshold: ${SPEC_AUTO_DELETE_THRESHOLD:30m}
  async-threshold: ${SPEC_ASYNC_THRESHOLD:5242880}
  global-exclude:
    methods: ${SPEC_GLOBAL_EXCLUDE_METHODS:}
    path-patterns: ${SPEC_GLOBAL_EXCLUDE_PATH_PATTERNS:}
    tags: ${SPEC_GLOBAL_EXCLUDE_TAGS:}

agent-loop:
  max-iterations: ${AGENT_MAX_ITERATIONS:20}
  timeout-seconds: ${AGENT_TIMEOUT_SECONDS:120}
  max-tool-calls-per-turn: ${AGENT_MAX_TOOL_CALLS_PER_TURN:5}
  max-concurrent: ${AGENT_MAX_CONCURRENT:10}
  two-stage-threshold: ${AGENT_TWO_STAGE_THRESHOLD:30}

ai:
  provider: ${AI_PROVIDER:mock}
  retry:
    max-attempts: ${AI_RETRY_MAX_ATTEMPTS:3}
    initial-delay-ms: ${AI_RETRY_INITIAL_DELAY_MS:1000}
    multiplier: ${AI_RETRY_MULTIPLIER:2.0}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:openai/gpt-4o}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Actuator + Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ai-test-forge
