services:
  mysql:
    image: mysql:8.0
    container_name: ai-test-forge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_test_forge
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ai-test-forge-server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PROFILE: local
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ai_test_forge
      DB_USERNAME: root
      DB_PASSWORD: root
      SERVER_PORT: 8080
      JWT_SECRET: ZG9ja2VyLWNvbXBvc2UtZGV2LXNlY3JldC1rZXktMzI=
      JWT_EXPIRATION_MS: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    container_name: ai-test-forge-web
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mysql_data:
